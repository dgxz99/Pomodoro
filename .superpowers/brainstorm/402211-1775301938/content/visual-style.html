<h2>你喜欢哪种视觉风格？</h2>
<p class="subtitle">选择番茄钟应用的整体设计方向</p>

<div class="cards">
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 24px; min-height: 200px;">
      <div style="background: rgba(255,255,255,0.15); border-radius: 50%; width: 120px; height: 120px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px);">
        <span style="font-size: 32px; color: white; font-weight: 300;">25:00</span>
      </div>
      <div style="text-align: center;">
        <div style="background: rgba(255,255,255,0.2); border-radius: 20px; padding: 8px 24px; display: inline-block;">
          <span style="color: white; font-size: 14px;">开始专注</span>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>A. 渐变玻璃风格</h3>
      <p>现代渐变背景 + 毛玻璃效果，色彩丰富，视觉冲击力强</p>
    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #1a1a2e; padding: 24px; min-height: 200px;">
      <div style="border: 3px solid #e94560; border-radius: 50%; width: 120px; height: 120px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; position: relative;">
        <svg style="position: absolute; top: -3px; left: -3px;" width="126" height="126" viewBox="0 0 126 126">
          <circle cx="63" cy="63" r="60" fill="none" stroke="#e94560" stroke-width="3" stroke-dasharray="280 377" stroke-linecap="round" transform="rotate(-90 63 63)" opacity="0.3"/>
        </svg>
        <span style="font-size: 28px; color: #fff; font-family: monospace;">25:00</span>
      </div>
      <div style="text-align: center;">
        <div style="background: #e94560; border-radius: 8px; padding: 10px 28px; display: inline-block;">
          <span style="color: white; font-size: 14px; font-weight: 500;">START</span>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>B. 深色极简风格</h3>
      <p>深色背景 + 亮色强调，专注感强，适合长时间使用，护眼</p>
    </div>
  </div>

  <div class="card" data-choice="c" onclick="toggleSelect(this)">
    <div class="card-image" style="background: #fef9f3; padding: 24px; min-height: 200px;">
      <div style="background: #ff6b6b; border-radius: 50%; width: 120px; height: 120px; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(255,107,107,0.3);">
        <span style="font-size: 28px; color: white; font-weight: 600;">25:00</span>
      </div>
      <div style="text-align: center;">
        <div style="background: #ff6b6b; border-radius: 24px; padding: 10px 28px; display: inline-block; box-shadow: 0 4px 12px rgba(255,107,107,0.3);">
          <span style="color: white; font-size: 14px; font-weight: 500;">开始</span>
        </div>
      </div>
      <div style="display: flex; justify-content: center; gap: 8px; margin-top: 12px;">
        <div style="width: 8px; height: 8px; background: #ff6b6b; border-radius: 50%;"></div>
        <div style="width: 8px; height: 8px; background: #ddd; border-radius: 50%;"></div>
        <div style="width: 8px; height: 8px; background: #ddd; border-radius: 50%;"></div>
        <div style="width: 8px; height: 8px; background: #ddd; border-radius: 50%;"></div>
      </div>
    </div>
    <div class="card-body">
      <h3>C. 番茄红暖色风格</h3>
      <p>浅色背景 + 番茄红主色调，温暖活泼，符合番茄钟主题</p>
    </div>
  </div>
</div>

<div class="section" style="margin-top: 24px; padding: 16px; background: rgba(255,255,255,0.05); border-radius: 8px;">
  <p style="margin: 0; opacity: 0.7; font-size: 14px;">提示：所有风格都支持深色/浅色模式切换，这里选择的是默认主题方向</p>
</div>
