<h2>番茄红暖色风格 - 纵向布局</h2>
<p class="subtitle">确认主界面的布局方案</p>

<div style="display: flex; justify-content: center; gap: 48px; align-items: flex-start; flex-wrap: wrap;">
  
  <!-- 手机模拟框 -->
  <div style="width: 200px; background: #fef9f3; border-radius: 20px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.15); flex-shrink: 0;">
    
    <!-- 状态栏 -->
    <div style="padding: 6px 12px; display: flex; justify-content: space-between; font-size: 10px; color: #666;">
      <span>9:41</span>
      <span>100%</span>
    </div>
    
    <!-- 主内容 -->
    <div style="padding: 12px 16px; display: flex; flex-direction: column; align-items: center;">
      
      <!-- 标题 -->
      <div style="font-size: 13px; color: #333; font-weight: 600; margin-bottom: 12px;">专注时间</div>
      
      <!-- 进度点 -->
      <div style="display: flex; gap: 6px; margin-bottom: 16px;">
        <div style="width: 6px; height: 6px; background: #ff6b6b; border-radius: 50%;"></div>
        <div style="width: 6px; height: 6px; background: #ffd4d4; border-radius: 50%;"></div>
        <div style="width: 6px; height: 6px; background: #ffd4d4; border-radius: 50%;"></div>
        <div style="width: 6px; height: 6px; background: #ffd4d4; border-radius: 50%;"></div>
      </div>
      
      <!-- 计时器 -->
      <div style="background: #ff6b6b; border-radius: 50%; width: 100px; height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 8px 24px rgba(255,107,107,0.35); margin-bottom: 16px;">
        <span style="font-size: 22px; color: white; font-weight: 600;">25:00</span>
        <span style="font-size: 9px; color: rgba(255,255,255,0.8);">专注中</span>
      </div>
      
      <!-- 控制按钮 - 深色背景更醒目 -->
      <div style="display: flex; gap: 12px; margin-bottom: 16px;">
        <div style="width: 36px; height: 36px; background: #3d3d3d; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,0.15);">
          <span style="color: white; font-size: 12px;">⏸</span>
        </div>
        <div style="width: 36px; height: 36px; background: #3d3d3d; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,0.15);">
          <span style="color: white; font-size: 12px;">⏹</span>
        </div>
      </div>
      
      <!-- 统计卡片 -->
      <div style="background: white; border-radius: 10px; padding: 10px 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); width: 100%;">
        <div style="display: flex; justify-content: space-around; text-align: center;">
          <div>
            <div style="font-size: 16px; font-weight: 600; color: #ff6b6b;">3</div>
            <div style="font-size: 9px; color: #999;">今日番茄</div>
          </div>
          <div style="width: 1px; background: #eee;"></div>
          <div>
            <div style="font-size: 16px; font-weight: 600; color: #ff6b6b;">75</div>
            <div style="font-size: 9px; color: #999;">专注分钟</div>
          </div>
        </div>
      </div>
      
    </div>
    
    <!-- 底部导航 - 更紧凑 -->
    <div style="background: white; padding: 6px 16px; display: flex; justify-content: space-around; border-top: 1px solid #f0f0f0;">
      <div style="text-align: center;">
        <div style="font-size: 12px;">🍅</div>
        <div style="font-size: 7px; color: #ff6b6b;">计时</div>
      </div>
      <div style="text-align: center;">
        <div style="font-size: 12px;">📊</div>
        <div style="font-size: 7px; color: #999;">统计</div>
      </div>
      <div style="text-align: center;">
        <div style="font-size: 12px;">⚙️</div>
        <div style="font-size: 7px; color: #999;">设置</div>
      </div>
    </div>
    
  </div>

  <!-- 布局说明 -->
  <div style="flex: 1; min-width: 280px; max-width: 400px;">
    <h3 style="margin: 0 0 16px 0; color: #ff6b6b;">布局结构</h3>
    
    <div style="background: rgba(255,255,255,0.08); border-radius: 12px; padding: 16px;">
      <div style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1);">
        <div style="font-weight: 600; margin-bottom: 4px;">1. 顶部标题</div>
        <div style="font-size: 13px; opacity: 0.7;">显示当前模式：专注时间 / 短休息 / 长休息</div>
      </div>
      
      <div style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1);">
        <div style="font-weight: 600; margin-bottom: 4px;">2. 进度指示器</div>
        <div style="font-size: 13px; opacity: 0.7;">4个点显示当前是第几个番茄周期</div>
      </div>
      
      <div style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1);">
        <div style="font-weight: 600; margin-bottom: 4px;">3. 圆形计时器</div>
        <div style="font-size: 13px; opacity: 0.7;">视觉焦点，显示剩余时间和状态</div>
      </div>
      
      <div style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1);">
        <div style="font-weight: 600; margin-bottom: 4px;">4. 控制按钮</div>
        <div style="font-size: 13px; opacity: 0.7;">深色按钮，暂停 / 停止操作</div>
      </div>
      
      <div style="margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1);">
        <div style="font-weight: 600; margin-bottom: 4px;">5. 今日统计</div>
        <div style="font-size: 13px; opacity: 0.7;">完成番茄数、专注分钟数</div>
      </div>
      
      <div>
        <div style="font-weight: 600; margin-bottom: 4px;">6. 底部导航</div>
        <div style="font-size: 13px; opacity: 0.7;">紧凑设计，计时 / 统计 / 设置</div>
      </div>
    </div>
  </div>

</div>
