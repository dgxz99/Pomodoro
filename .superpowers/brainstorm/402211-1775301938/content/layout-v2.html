<h2>番茄红暖色风格 - 纵向布局</h2>
<p class="subtitle">确认主界面的布局方案</p>

<div style="display: flex; justify-content: center; gap: 40px; flex-wrap: wrap;">
  
  <!-- 手机模拟框 -->
  <div class="card" data-choice="a" onclick="toggleSelect(this)" style="width: 280px;">
    <div class="card-image" style="background: #fef9f3; padding: 0; border-radius: 24px; overflow: hidden;">
      <!-- 手机状态栏 -->
      <div style="background: #fef9f3; padding: 8px 16px; display: flex; justify-content: space-between; font-size: 12px; color: #666;">
        <span>9:41</span>
        <span>100%</span>
      </div>
      
      <!-- 主内容区 -->
      <div style="padding: 20px; min-height: 480px; display: flex; flex-direction: column; align-items: center;">
        
        <!-- 顶部标题 -->
        <div style="text-align: center; margin-bottom: 24px;">
          <span style="font-size: 18px; color: #333; font-weight: 600;">专注时间</span>
        </div>
        
        <!-- 番茄进度指示器 -->
        <div style="display: flex; gap: 8px; margin-bottom: 32px;">
          <div style="width: 10px; height: 10px; background: #ff6b6b; border-radius: 50%;"></div>
          <div style="width: 10px; height: 10px; background: #ffd4d4; border-radius: 50%;"></div>
          <div style="width: 10px; height: 10px; background: #ffd4d4; border-radius: 50%;"></div>
          <div style="width: 10px; height: 10px; background: #ffd4d4; border-radius: 50%;"></div>
        </div>
        
        <!-- 计时器圆形 -->
        <div style="background: #ff6b6b; border-radius: 50%; width: 180px; height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 12px 32px rgba(255,107,107,0.35); margin-bottom: 40px;">
          <span style="font-size: 42px; color: white; font-weight: 600; letter-spacing: 2px;">25:00</span>
          <span style="font-size: 13px; color: rgba(255,255,255,0.8); margin-top: 4px;">专注中</span>
        </div>
        
        <!-- 控制按钮 -->
        <div style="display: flex; gap: 20px; margin-bottom: 32px;">
          <div style="width: 56px; height: 56px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <span style="font-size: 20px;">⏸</span>
          </div>
          <div style="width: 56px; height: 56px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <span style="font-size: 20px;">⏹</span>
          </div>
        </div>
        
        <!-- 今日统计 -->
        <div style="background: white; border-radius: 16px; padding: 16px 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); width: 100%;">
          <div style="display: flex; justify-content: space-around; text-align: center;">
            <div>
              <div style="font-size: 24px; font-weight: 600; color: #ff6b6b;">3</div>
              <div style="font-size: 12px; color: #999;">今日番茄</div>
            </div>
            <div style="width: 1px; background: #eee;"></div>
            <div>
              <div style="font-size: 24px; font-weight: 600; color: #ff6b6b;">75</div>
              <div style="font-size: 12px; color: #999;">专注分钟</div>
            </div>
          </div>
        </div>
        
      </div>
      
      <!-- 底部导航 -->
      <div style="background: white; padding: 12px 24px; display: flex; justify-content: space-around; border-top: 1px solid #f0f0f0;">
        <div style="text-align: center;">
          <div style="font-size: 20px;">🍅</div>
          <div style="font-size: 10px; color: #ff6b6b; margin-top: 2px;">计时</div>
        </div>
        <div style="text-align: center;">
          <div style="font-size: 20px;">📊</div>
          <div style="font-size: 10px; color: #999; margin-top: 2px;">统计</div>
        </div>
        <div style="text-align: center;">
          <div style="font-size: 20px;">⚙️</div>
          <div style="font-size: 10px; color: #999; margin-top: 2px;">设置</div>
        </div>
      </div>
      
    </div>
    <div class="card-body">
      <h3>主界面布局</h3>
      <p>纵向排列：标题 → 进度 → 计时器 → 控制 → 统计 → 导航</p>
    </div>
  </div>

</div>

<div class="section" style="margin-top: 24px; padding: 16px; background: rgba(255,255,255,0.05); border-radius: 8px;">
  <h4 style="margin: 0 0 8px 0;">布局说明</h4>
  <ul style="margin: 0; padding-left: 20px; font-size: 14px; opacity: 0.8;">
    <li>顶部：当前模式标题（专注时间/短休息/长休息）</li>
    <li>进度指示：4个点显示当前是第几个番茄</li>
    <li>中心：大圆形计时器，视觉焦点</li>
    <li>控制区：暂停/停止按钮</li>
    <li>统计卡片：今日完成数据</li>
    <li>底部导航：计时、统计、设置三个页面</li>
  </ul>
</div>
